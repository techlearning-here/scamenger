# Run every 2 days to trigger a Vercel redeploy (e.g. refresh News page from RSS).
# Requires repo secret: VERCEL_DEPLOY_HOOK_URL (create in Vercel → Project → Settings → Git → Deploy Hooks).

name: Scheduled build (trigger Vercel redeploy)

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set. Skip."
            exit 0
          fi
          curl -f -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
